name: Build AI Client Agent Executables

# Builds a standalone double-click executable for Windows, macOS, and
# Linux every time you push to the repo, or manually via the
# "Run workflow" button on GitHub.
#
# Download the results from the "Actions" tab → pick the latest run
# → scroll to "Artifacts" at the bottom.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: AI_Client_Agent.exe
            asset_name: AI_Client_Agent-Windows.exe
          - os: macos-latest
            artifact_name: AI_Client_Agent
            asset_name: AI_Client_Agent-macOS
          - os: ubuntu-latest
            artifact_name: AI_Client_Agent
            asset_name: AI_Client_Agent-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller AI_Client_Agent.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
