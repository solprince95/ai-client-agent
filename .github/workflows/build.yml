name: Build AI Client Agent Executables

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: AI_Client_Agent.exe
            asset_name: AI_Client_Agent-Windows
          - os: macos-latest
            artifact_name: AI_Client_Agent
            asset_name: AI_Client_Agent-macOS
          - os: ubuntu-latest
            artifact_name: AI_Client_Agent
            asset_name: AI_Client_Agent-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller AI_Client_Agent.spec --noconfirm

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p release_pkg
          cp dist/AI_Client_Agent release_pkg/AI_Client_Agent-Linux
          cp Install_Linux.sh release_pkg/
          ls -la release_pkg/
          cd release_pkg && zip -r ../AI_Client_Agent-Linux.zip .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p release_pkg
          cp dist/AI_Client_Agent release_pkg/AI_Client_Agent-macOS
          cp Install_macOS.sh release_pkg/
          ls -la release_pkg/
          cd release_pkg && zip -r ../AI_Client_Agent-macOS.zip .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release_pkg
          Copy-Item "dist\AI_Client_Agent.exe" "release_pkg\AI_Client_Agent-Windows.exe"
          Copy-Item "Install_Windows.bat" "release_pkg\"
          Get-ChildItem release_pkg
          Compress-Archive -Path "release_pkg\*" -DestinationPath "AI_Client_Agent-Windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.zip
