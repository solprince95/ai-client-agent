<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Down for maintenance</title>
<style>
  :root {
    --bg:      #07070f;
    --s1:      #0d0d1a;
    --s2:      #131325;
    --s3:      #1a1a32;
    --blue:    #1d6aff;
    --blue2:   #5591ff;
    --glow:    rgba(29,106,255,.28);
    --t1:      #eceeff;
    --t2:      #7880aa;
    --t3:      #3a3f60;
    --bdr:     rgba(255,255,255,.08);
    --dis:     'Syne', system-ui, sans-serif;
    --body:    'Inter', system-ui, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%;
    background: var(--bg);
    color: var(--t1);
    font-family: var(--body);
  }
  .wrap {
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card {
    max-width:420px;
    width:100%;
    text-align:center;
    background: var(--s1);
    border: 1px solid var(--bdr);
    border-radius:16px;
    padding:48px 32px;
  }
  .icon-ring {
    width:76px;
    height:76px;
    border-radius:50%;
    background: var(--glow);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 24px;
  }
  .icon-ring svg {
    width:36px;
    height:36px;
    animation: spin 3s linear infinite;
  }
  h1 {
    font-family: var(--dis);
    font-size:22px;
    font-weight:600;
    margin-bottom:10px;
  }
  p {
    color: var(--t2);
    font-size:14px;
    line-height:1.6;
    margin-bottom:24px;
  }
  .dots {
    display:flex;
    gap:6px;
    justify-content:center;
    margin-bottom:20px;
  }
  .dot {
    width:7px;
    height:7px;
    border-radius:50%;
    background: var(--blue2);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  .bar {
    width:100%;
    max-width:220px;
    height:5px;
    border-radius:999px;
    background: var(--s3);
    overflow:hidden;
    margin:0 auto;
  }
  .bar-fill {
    width:40%;
    height:100%;
    border-radius:999px;
    background: var(--blue);
    animation: slide 1.8s ease-in-out infinite;
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity:.5; }
    40% { transform: translateY(-6px); opacity:1; }
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Down for maintenance</h1>
      <p>We're making a few improvements behind the scenes.<br/>Back shortly, thanks for your patience.</p>
      <div class="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <div class="bar"><div class="bar-fill"></div></div>
    </div>
  </div>
</body>
</html>
